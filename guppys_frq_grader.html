<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guppy's FRQ Grader</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --sky:#1a7abf; --sky-l:#e8f4fc; --sky-m:#b3d9f5;
  --lav:#7c5cbf; --lav-l:#f0ebfa;
  --mint:#0fa878; --mint-l:#e6f7f2;
  --coral:#e8564a; --coral-l:#fdecea;
  --gold:#c9932a; --gold-l:#fdf3e0;
  --cream:#fafaf8; --white:#fff;
  --text:#1e1b35; --text2:#5a5775; --muted:#9896b0;
  --border:#e2dff0; --borderh:#b5aedd;
  --card:#fff;
  --sh-sm:0 2px 8px rgba(30,27,53,.07);
  --sh:0 4px 20px rgba(30,27,53,.09);
  --sh-lg:0 10px 40px rgba(30,27,53,.14);
  --r:16px; --rs:10px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Nunito',sans-serif;background:var(--cream);color:var(--text);min-height:100vh;overflow-x:hidden}

/* ── BG ── */
.bg{position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 700px 500px at 0% 0%,rgba(26,122,191,.06) 0%,transparent 70%),
    radial-gradient(ellipse 600px 600px at 100% 100%,rgba(124,92,191,.06) 0%,transparent 70%),
    radial-gradient(ellipse 400px 300px at 60% 40%,rgba(15,168,120,.04) 0%,transparent 60%)}

/* ── HEADER ── */
header{position:relative;z-index:10;text-align:center;padding:44px 20px 24px;
  border-bottom:1px solid var(--border);background:rgba(255,255,255,.8);backdrop-filter:blur(10px)}
.logo-wrap{display:inline-block;margin-bottom:14px;animation:float 4s ease-in-out infinite;filter:drop-shadow(0 6px 18px rgba(26,122,191,.3))}
@keyframes float{0%,100%{transform:translateY(0) rotate(-2deg)}50%{transform:translateY(-9px) rotate(2deg)}}
header h1{font-family:'Playfair Display',serif;font-size:clamp(1.9rem,4.5vw,2.8rem);color:var(--text);line-height:1.1;letter-spacing:-.4px}
header h1 em{color:var(--sky);font-style:normal}
header h1 strong{color:var(--lav)}
.header-sub{margin-top:10px;font-size:.88rem;color:var(--muted);font-weight:700;letter-spacing:.3px;text-transform:uppercase}

/* ── CONTAINER ── */
.container{position:relative;z-index:5;max-width:880px;margin:0 auto;padding:32px 20px 110px}

/* ── CARDS ── */
.card{background:var(--card);border-radius:var(--r);padding:26px 28px;box-shadow:var(--sh);border:1px solid var(--border);margin-bottom:18px;animation:up .45s cubic-bezier(.16,1,.3,1) both}
@keyframes up{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

/* ── STEP LABEL ── */
.step-label{display:flex;align-items:center;gap:10px;margin-bottom:18px}
.step-num{width:26px;height:26px;border-radius:50%;background:var(--lav);color:#fff;font-weight:800;font-size:.8rem;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.step-title{font-family:'Playfair Display',serif;font-size:1.15rem;font-weight:700;color:var(--text)}

/* ── COURSE GRID ── */
.course-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:11px}
.course-btn{border:1.5px solid var(--border);background:var(--cream);border-radius:var(--r);padding:18px 14px;cursor:pointer;text-align:left;transition:all .2s cubic-bezier(.16,1,.3,1);font-family:'Nunito',sans-serif;display:flex;align-items:center;gap:13px}
.course-btn:hover{border-color:var(--sky);transform:translateY(-2px);box-shadow:var(--sh)}
.course-btn.active{border-color:var(--sky);background:var(--sky-l);box-shadow:var(--sh)}
.course-btn.active .cb-name{color:var(--sky)}
.cb-icon{font-size:1.9rem;flex-shrink:0}
.cb-name{font-weight:800;font-size:.97rem;color:var(--text);display:block;line-height:1.2}
.cb-full{font-size:.75rem;color:var(--muted);font-weight:600;display:block;margin-top:2px}

/* ── TYPE GRID ── */
.type-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:11px}
.type-btn{border:1.5px solid var(--border);background:var(--cream);border-radius:var(--r);padding:18px 12px 14px;cursor:pointer;text-align:center;transition:all .2s cubic-bezier(.16,1,.3,1);font-family:'Nunito',sans-serif}
.type-btn:hover{border-color:var(--sky);transform:translateY(-2px);box-shadow:var(--sh)}
.type-btn.active{border-color:var(--sky);background:var(--sky-l);box-shadow:var(--sh)}
.type-btn .ticon{font-size:1.9rem;display:block;margin-bottom:6px}
.type-btn .tlabel{font-weight:800;font-size:.95rem;color:var(--text);display:block}
.type-btn.active .tlabel{color:var(--sky)}
.type-btn .tsub{font-size:.73rem;color:var(--muted);font-weight:600}

/* ── FORM ── */
.field-group{margin-bottom:16px}
label{display:block;font-weight:700;font-size:.79rem;color:var(--text2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
label .hint{text-transform:none;font-weight:500;color:var(--muted);font-size:.78rem;letter-spacing:0}
textarea,input[type=text]{width:100%;border:1.5px solid var(--border);border-radius:var(--rs);padding:11px 13px;font-family:'Nunito',sans-serif;font-size:.95rem;color:var(--text);background:var(--cream);resize:vertical;transition:border-color .18s,box-shadow .18s,background .18s;outline:none;line-height:1.6}
textarea:focus,input[type=text]:focus{border-color:var(--sky);box-shadow:0 0 0 3px rgba(26,122,191,.1);background:var(--white)}
textarea{min-height:92px}

/* ── UNIFIED INPUT BOX ── */
.uib{border:1.5px solid var(--border);border-radius:var(--rs);background:var(--white);overflow:hidden;transition:border-color .18s,box-shadow .18s}
.uib:focus-within{border-color:var(--sky);box-shadow:0 0 0 3px rgba(26,122,191,.1)}
.uib.has-img{border-color:var(--mint)}
.uib-note{background:#f5f4ff;border-bottom:1px solid var(--border);padding:9px 13px;font-size:.78rem;color:var(--text2);font-weight:700;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.uib-note span{color:var(--muted);font-weight:600}
.uib-note kbd{background:var(--border);border-radius:4px;padding:1px 6px;font-family:monospace;font-size:.76rem;color:var(--text2)}
.uib-img-row{padding:10px 12px 0;display:none}
.uib-img-row.show{display:block}
.uib-img-preview{max-width:100%;max-height:180px;border-radius:7px;border:1px solid var(--border);display:block}
.uib-img-footer{display:flex;align-items:center;justify-content:space-between;padding:6px 12px 8px;gap:8px}
.uib-upload-btn{display:inline-flex;align-items:center;gap:5px;background:var(--sky-l);color:var(--sky);border:1px solid var(--sky-m);border-radius:6px;padding:4px 11px;font-size:.76rem;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;transition:background .15s;position:relative;overflow:hidden}
.uib-upload-btn input{position:absolute;inset:0;opacity:0;cursor:pointer;font-size:0}
.uib-upload-btn:hover{background:var(--sky-m)}
.uib-remove-btn{display:none;align-items:center;gap:4px;background:var(--coral-l);color:var(--coral);border:1px solid #f5c2be;border-radius:6px;padding:4px 10px;font-size:.75rem;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif}
.uib-remove-btn.show{display:inline-flex}
.uib-divider{display:flex;align-items:center;gap:8px;padding:0 12px;font-size:.74rem;color:var(--muted);font-weight:700}
.uib-divider::before,.uib-divider::after{content:'';flex:1;height:1px;background:var(--border)}
.uib textarea{border:none;border-radius:0;background:transparent;box-shadow:none!important;padding:10px 13px;min-height:80px}
.uib textarea:focus{background:transparent}

/* ── DOC BLOCKS ── */
.doc-block{background:#faf9ff;border:1.5px solid var(--border);border-radius:var(--r);padding:18px;margin-bottom:13px;transition:border-color .2s}
.doc-block:focus-within{border-color:var(--borderh)}
.doc-header{display:flex;align-items:center;gap:9px;margin-bottom:14px}
.doc-num{width:24px;height:24px;background:linear-gradient(135deg,var(--sky),var(--lav));color:#fff;border-radius:7px;font-size:.77rem;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.doc-title{font-weight:800;font-size:.86rem;color:var(--text);text-transform:uppercase;letter-spacing:.4px}
.q-block{background:#faf9ff;border:1.5px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:11px}
.q-title{font-weight:800;font-size:.82rem;color:var(--lav);margin-bottom:9px;text-transform:uppercase;letter-spacing:.5px}
.sdiv{display:flex;align-items:center;gap:9px;margin:13px 0;color:var(--muted);font-size:.76rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.sdiv::before,.sdiv::after{content:'';flex:1;height:1px;background:var(--border)}

/* ── SAQ TOGGLE ── */
.tog-row{display:flex;gap:6px;margin-bottom:18px;background:var(--cream);border:1.5px solid var(--border);border-radius:var(--rs);padding:3px}
.tog-btn{flex:1;padding:8px 10px;border:none;border-radius:8px;background:transparent;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:700;font-size:.85rem;color:var(--muted);transition:all .2s;text-align:center}
.tog-btn.active{background:var(--white);color:var(--sky);box-shadow:var(--sh-sm)}

/* ── SUBMIT ── */
#userResponse{min-height:190px;font-size:.96rem;line-height:1.75}
.submit-btn{width:100%;padding:15px 24px;border:none;border-radius:var(--r);background:linear-gradient(135deg,var(--sky) 0%,var(--lav) 100%);color:#fff;font-family:'Playfair Display',serif;font-size:1.15rem;font-weight:700;cursor:pointer;transition:all .25s;box-shadow:0 4px 20px rgba(26,122,191,.32);display:flex;align-items:center;justify-content:center;gap:10px}
.submit-btn:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(26,122,191,.42)}
.submit-btn:active{transform:translateY(0)}

/* ── LOADING ── */
#loading{display:none;text-align:center;padding:60px 20px;background:var(--card);border-radius:var(--r);box-shadow:var(--sh);border:1px solid var(--border);margin-bottom:18px}
.spin-wrap{position:relative;width:54px;height:54px;margin:0 auto 18px}
.spin-r{position:absolute;inset:0;border-radius:50%;border:4px solid transparent}
.spin-r:nth-child(1){border-top-color:var(--sky);animation:spin 1s linear infinite}
.spin-r:nth-child(2){border-right-color:var(--lav);animation:spin 1.4s linear infinite reverse;inset:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.load-t{font-family:'Playfair Display',serif;font-size:1.1rem;color:var(--text);margin-bottom:5px}
.load-s{font-size:.86rem;color:var(--muted);font-weight:600}

/* ── RESULTS ── */
#results{display:none;background:var(--card);border-radius:var(--r);box-shadow:var(--sh-lg);border:1px solid var(--border);margin-bottom:18px;overflow:hidden;animation:up .5s cubic-bezier(.16,1,.3,1) both}
.res-hdr{padding:22px 26px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.res-hdr h2{font-family:'Playfair Display',serif;font-size:1.38rem;color:var(--text);flex:1}
.score-badge{font-family:'Playfair Display',serif;font-size:1.05rem;font-weight:700;padding:7px 20px;border-radius:50px;color:#fff}
.s-hi{background:linear-gradient(135deg,var(--mint),#089162)}
.s-md{background:linear-gradient(135deg,#f0a500,#d4840a)}
.s-lo{background:linear-gradient(135deg,var(--coral),#c0392b)}
.res-body{padding:20px 26px 26px}
.res-sec{margin-bottom:20px}
.res-sec-t{font-family:'Playfair Display',serif;font-size:.98rem;color:var(--text);margin-bottom:9px;padding-bottom:7px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:7px}
.rrow{display:flex;gap:9px;align-items:flex-start;padding:8px 12px;border-radius:var(--rs);margin-bottom:5px;border:1px solid transparent}
.rrow.e{background:var(--mint-l);border-color:#a8e6d5}
.rrow.m{background:var(--coral-l);border-color:#f5c2be}
.rrow .ri{font-size:.9rem;flex-shrink:0;margin-top:2px}
.rrow .rt{font-size:.91rem;line-height:1.55}
.fitem{display:flex;gap:9px;align-items:flex-start;padding:8px 0;border-bottom:1px solid var(--border);font-size:.91rem;line-height:1.55}
.fitem:last-child{border-bottom:none}
.fitem .fi{flex-shrink:0;font-size:.9rem;margin-top:2px}
.overall{background:linear-gradient(135deg,var(--sky-l),var(--lav-l));border:1px solid var(--sky-m);border-radius:var(--rs);padding:14px 16px;font-size:.92rem;line-height:1.68;color:var(--text)}
.retry-btn{width:100%;padding:12px;border:1.5px solid var(--border);border-radius:var(--rs);background:#fff;color:var(--text2);font-family:'Nunito',sans-serif;font-weight:700;font-size:.9rem;cursor:pointer;transition:all .2s;margin-top:6px;display:flex;align-items:center;justify-content:center;gap:7px}
.retry-btn:hover{border-color:var(--lav);color:var(--lav);background:var(--lav-l)}

.hidden{display:none!important}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(12px);background:var(--text);color:#fff;padding:8px 20px;border-radius:50px;font-size:.83rem;font-weight:700;opacity:0;pointer-events:none;transition:all .3s;z-index:1000;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

footer{position:relative;z-index:5;text-align:center;padding:18px;font-size:.81rem;color:var(--muted);font-weight:600;border-top:1px solid var(--border);background:rgba(255,255,255,.5)}
footer strong{color:var(--text2)}

@media(max-width:580px){
  .course-grid{grid-template-columns:1fr}
  .type-grid{grid-template-columns:1fr}
  .card{padding:18px 16px}
  .res-hdr,.res-body{padding-left:16px;padding-right:16px}
}
</style>
</head>
<body>
<div class="bg"></div>

<!-- ════════════ HEADER ════════════ -->
<header>
  <!-- GUPPY SVG LOGO -->
  <div class="logo-wrap">
    <svg width="110" height="90" viewBox="0 0 110 90" xmlns="http://www.w3.org/2000/svg">
      <!-- Globe -->
      <circle cx="55" cy="50" r="34" fill="#1a7abf" opacity=".18"/>
      <circle cx="55" cy="50" r="34" fill="none" stroke="#1a7abf" stroke-width="2.5" opacity=".5"/>
      <!-- Globe latitude lines -->
      <ellipse cx="55" cy="50" rx="34" ry="12" fill="none" stroke="#1a7abf" stroke-width="1.2" opacity=".35"/>
      <ellipse cx="55" cy="50" rx="34" ry="22" fill="none" stroke="#1a7abf" stroke-width="1" opacity=".25"/>
      <line x1="55" y1="16" x2="55" y2="84" stroke="#1a7abf" stroke-width="1.2" opacity=".35"/>
      <line x1="21" y1="50" x2="89" y2="50" stroke="#1a7abf" stroke-width="1.2" opacity=".35"/>
      <!-- Crown on top of globe -->
      <polygon points="42,16 47,6 52,14 55,4 58,14 63,6 68,16" fill="#c9932a" stroke="#a07010" stroke-width="1" stroke-linejoin="round"/>
      <!-- Guppy body (sitting atop globe, slightly tilted) -->
      <g transform="translate(55,36) rotate(-12)">
        <!-- tail fin -->
        <path d="M28,0 L44,-14 L46,0 L44,14 Z" fill="#FF6B9D" opacity=".9"/>
        <!-- body -->
        <ellipse cx="12" cy="0" rx="22" ry="13" fill="#FF9F3F"/>
        <!-- belly highlight -->
        <ellipse cx="8" cy="3" rx="13" ry="7" fill="#FFD580" opacity=".6"/>
        <!-- dorsal fin -->
        <path d="M2,-12 Q12,-22 20,-12" fill="#FF6B9D" opacity=".85"/>
        <!-- pectoral fin -->
        <path d="M0,5 Q-6,14 4,12" fill="#FF8C30" opacity=".8"/>
        <!-- head -->
        <circle cx="-10" cy="0" r="11" fill="#FFB347"/>
        <!-- eye -->
        <circle cx="-13" cy="-3" r="4.5" fill="#fff"/>
        <circle cx="-13" cy="-3" r="2.8" fill="#1e1b35"/>
        <circle cx="-12" cy="-4" r="1" fill="#fff" opacity=".8"/>
        <!-- smile -->
        <path d="M-8,3 Q-5,7 -2,3" stroke="#c05010" stroke-width="1.3" fill="none" stroke-linecap="round"/>
        <!-- scales pattern -->
        <ellipse cx="5" cy="-3" rx="4" ry="2.5" fill="none" stroke="#e07020" stroke-width=".8" opacity=".5"/>
        <ellipse cx="13" cy="-2" rx="4" ry="2.5" fill="none" stroke="#e07020" stroke-width=".8" opacity=".5"/>
        <!-- tiny graduation cap on guppy -->
        <rect x="-20" y="-25" width="20" height="4" rx="1" fill="#1e1b35"/>
        <rect x="-14" y="-29" width="8" height="5" rx="1" fill="#1e1b35"/>
        <line x1="-2" y1="-23" x2="5" y2="-18" stroke="#c9932a" stroke-width="1.5" stroke-linecap="round"/>
        <circle cx="5" cy="-18" r="2" fill="#c9932a"/>
      </g>
      <!-- Stars around globe -->
      <text x="12" y="28" font-size="9" fill="#c9932a">★</text>
      <text x="87" y="32" font-size="7" fill="#c9932a">★</text>
      <text x="8" y="68" font-size="6" fill="#7c5cbf">★</text>
      <text x="92" y="72" font-size="8" fill="#7c5cbf">★</text>
    </svg>
  </div>
  <h1><strong>Guppy's</strong> <em>FRQ Grader</em></h1>
  <div class="header-sub">Official College Board Rubrics · DBQ · LEQ · SAQ</div>
</header>

<div class="container">

  <!-- ── STEP 1: COURSE ── -->
  <div class="card" id="step1">
    <div class="step-label"><div class="step-num">1</div><div class="step-title">Select Your Course</div></div>
    <div class="course-grid">
      <button class="course-btn" onclick="selectCourse('apwh',this)">
        <span class="cb-icon">🌍</span>
        <span><span class="cb-name">AP World History</span><span class="cb-full">Modern · 1200–Present</span></span>
      </button>
      <button class="course-btn" onclick="selectCourse('apush',this)">
        <span class="cb-icon">🦅</span>
        <span><span class="cb-name">APUSH</span><span class="cb-full">AP United States History</span></span>
      </button>
      <button class="course-btn" onclick="selectCourse('apeuro',this)">
        <span class="cb-icon">🏰</span>
        <span><span class="cb-name">AP European History</span><span class="cb-full">1450–Present</span></span>
      </button>
      <button class="course-btn" onclick="selectCourse('apaas',this)">
        <span class="cb-icon">✊</span>
        <span><span class="cb-name">AP African American Studies</span><span class="cb-full">Interdisciplinary · FRQ</span></span>
      </button>
    </div>
  </div>

  <!-- ── STEP 2: TYPE ── -->
  <div class="card hidden" id="step2">
    <div class="step-label"><div class="step-num">2</div><div class="step-title">Select Question Type</div></div>
    <div class="type-grid" id="typeGrid"></div>
  </div>

  <!-- ── STEP 3: DETAILS ── -->
  <div class="card hidden" id="step3">
    <div class="step-label"><div class="step-num">3</div><div class="step-title" id="step3title">Question Details</div></div>
    <div id="step3content"></div>
  </div>

  <!-- ── STEP 4: RESPONSE ── -->
  <div class="card hidden" id="step4">
    <div class="step-label"><div class="step-num">4</div><div class="step-title">Your Response</div></div>
    <div class="field-group">
      <label for="userResponse">Student Response <span class="hint">— type or paste your full essay / answer</span></label>
      <textarea id="userResponse" rows="14" placeholder="Write or paste your response here…"></textarea>
    </div>
    <button class="submit-btn" onclick="submitGrade()">Grade My Work <span style="font-size:1.1rem">→</span></button>
  </div>

  <!-- ── LOADING ── -->
  <div id="loading">
    <div class="spin-wrap"><div class="spin-r"></div><div class="spin-r"></div></div>
    <div class="load-t">Analyzing your response…</div>
    <div class="load-s">Applying College Board rubric criteria</div>
  </div>

  <!-- ── RESULTS ── -->
  <div id="results">
    <div class="res-hdr">
      <h2>📋 Grading Results</h2>
      <div class="score-badge" id="scoreBadge"></div>
    </div>
    <div class="res-body" id="resBody"></div>
  </div>

</div>

<footer>Built for AP History students &nbsp;·&nbsp; <strong>created by jguppy</strong></footer>
<div class="toast" id="toast"></div>

<script>
// ════ STATE ════
let currentCourse = null;
let currentType   = null;
const IMG = {}; // key → base64

// ════ TOAST ════
function toast(msg, d=2200){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),d);
}

// ════ COURSE TYPES MAP ════
const COURSE_TYPES = {
  apwh:  [{id:'dbq',icon:'📜',label:'DBQ',sub:'Document-Based'},{id:'leq',icon:'✍️',label:'LEQ',sub:'Long Essay'},{id:'saq',icon:'🔍',label:'SAQ',sub:'Short Answer'}],
  apush: [{id:'dbq',icon:'📜',label:'DBQ',sub:'Document-Based'},{id:'leq',icon:'✍️',label:'LEQ',sub:'Long Essay'},{id:'saq',icon:'🔍',label:'SAQ',sub:'Short Answer'}],
  apeuro:[{id:'dbq',icon:'📜',label:'DBQ',sub:'Document-Based'},{id:'leq',icon:'✍️',label:'LEQ',sub:'Long Essay'},{id:'saq',icon:'🔍',label:'SAQ',sub:'Short Answer'}],
  apaas: [{id:'frq',icon:'📝',label:'FRQ',sub:'Free Response'}]
};
const COURSE_NAMES = {apwh:'AP World History',apush:'AP United States History',apeuro:'AP European History',apaas:'AP African American Studies'};

// ════ STEP 1: SELECT COURSE ════
function selectCourse(course, btn){
  currentCourse=course; currentType=null;
  document.querySelectorAll('.course-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  // Build type grid
  const types=COURSE_TYPES[course];
  const grid=document.getElementById('typeGrid');
  grid.innerHTML=types.map(t=>`
    <button class="type-btn" onclick="selectType('${t.id}',this)">
      <span class="ticon">${t.icon}</span>
      <span class="tlabel">${t.label}</span>
      <span class="tsub">${t.sub}</span>
    </button>`).join('');
  show('step2'); hide('step3'); hide('step4'); hide('results'); hide('loading');
  anim('step2');
}

// ════ STEP 2: SELECT TYPE ════
function selectType(type, btn){
  currentType=type;
  document.querySelectorAll('.type-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const titles={dbq:'📜 Document-Based Question',leq:'✍️ Long Essay Question',saq:'🔍 Short Answer Question',frq:'📝 Free Response Question'};
  document.getElementById('step3title').textContent=titles[type]||type.toUpperCase();
  document.getElementById('step3content').innerHTML=buildStep3(type);
  show('step3'); show('step4');
  anim('step3'); anim('step4');
  if(type==='saq') setSaqSub('stimulus');
}

// ════ BUILD STEP 3 ════
function buildStep3(type){
  if(type==='leq') return buildLEQ();
  if(type==='dbq') return buildDBQ();
  if(type==='saq') return buildSAQ();
  if(type==='frq') return buildFRQ();
  return '';
}

// ════ UNIFIED INPUT BOX ════
// A single clean box: note at top, image preview area, divider, textarea
// key = unique ID for IMG store
function uib(key, placeholder, rows=4){
  return `<div class="uib" id="uib-${key}">
    <div class="uib-note">
      📎 <span>Paste an image (<kbd>Ctrl+V</kbd>/<kbd>⌘V</kbd>), drag &amp; drop, or upload — <em>or</em> just type below</span>
      <span class="uib-upload-btn">⬆ Upload<input type="file" accept="image/*" onchange="uibFile('${key}',event)"></span>
      <span class="uib-remove-btn" id="uibrm-${key}" onclick="uibRemove('${key}')">✕ Remove image</span>
    </div>
    <div class="uib-img-row" id="uibrow-${key}">
      <img class="uib-img-preview" id="uibimg-${key}" src="" alt="preview">
    </div>
    <div class="uib-divider" id="uibdiv-${key}" style="display:none">— or add text below —</div>
    <textarea id="uibtxt-${key}" rows="${rows}" placeholder="${placeholder}"
      ondragover="uibDragOver(event,'${key}')" ondragleave="uibDragLeave('${key}')" ondrop="uibDrop(event,'${key}')"
      style="resize:vertical"></textarea>
  </div>`;
}

// ── UIB LOGIC ──
function uibSet(key, dataUrl){
  IMG[key]=dataUrl;
  const row=document.getElementById('uibrow-'+key);
  const img=document.getElementById('uibimg-'+key);
  const rm=document.getElementById('uibrm-'+key);
  const div=document.getElementById('uibdiv-'+key);
  const box=document.getElementById('uib-'+key);
  img.src=dataUrl; row.classList.add('show');
  rm.classList.add('show'); div.style.display='flex';
  box.classList.add('has-img');
  toast('✅ Image added!');
}
function uibRemove(key){
  delete IMG[key];
  const row=document.getElementById('uibrow-'+key);
  const img=document.getElementById('uibimg-'+key);
  const rm=document.getElementById('uibrm-'+key);
  const div=document.getElementById('uibdiv-'+key);
  const box=document.getElementById('uib-'+key);
  img.src=''; row.classList.remove('show');
  rm.classList.remove('show'); div.style.display='none';
  box.classList.remove('has-img');
  toast('🗑️ Image removed');
}
function uibFile(key,e){ const f=e.target.files[0]; if(f) uibLoad(key,f); }
function uibLoad(key,f){ const r=new FileReader(); r.onload=ev=>uibSet(key,ev.target.result); r.readAsDataURL(f); }
function uibDragOver(e,key){ e.preventDefault(); document.getElementById('uib-'+key).style.outline='2px solid var(--sky)'; }
function uibDragLeave(key){ document.getElementById('uib-'+key).style.outline=''; }
function uibDrop(e,key){
  e.preventDefault(); uibDragLeave(key);
  const f=e.dataTransfer.files[0];
  if(f&&f.type.startsWith('image/')) uibLoad(key,f);
}

// Global paste → nearest uib textarea focused or first empty uib
document.addEventListener('paste',e=>{
  const items=e.clipboardData?.items; if(!items) return;
  for(const item of items){
    if(item.type.startsWith('image/')){
      e.preventDefault();
      const f=item.getAsFile();
      // find focused uib textarea
      const active=document.activeElement;
      let key=null;
      if(active && active.id && active.id.startsWith('uibtxt-')) key=active.id.replace('uibtxt-','');
      if(!key){
        // find first uib without image that's visible
        const boxes=document.querySelectorAll('.uib:not(.has-img)');
        if(boxes.length) key=boxes[0].id.replace('uib-','');
      }
      if(key){ uibLoad(key,f); toast('📋 Image pasted!'); }
      break;
    }
  }
});

// ════ BUILD LEQ ════
function buildLEQ(){
  return `<div class="field-group">
    <label>Prompt <span class="hint">— paste/upload an image or type the prompt text</span></label>
    ${uib('leqprompt','Type the LEQ prompt here…',3)}
  </div>`;
}

// ════ BUILD DBQ ════
function buildDBQ(){
  let html=`<div class="field-group">
    <label>DBQ Prompt <span class="hint">— paste/upload an image of the prompt or type it</span></label>
    ${uib('dbqprompt','Type the DBQ prompt / essay question here…',2)}
  </div>
  <div class="sdiv">Documents</div>
  <p style="font-size:.85rem;color:var(--text2);font-weight:600;margin-bottom:14px">Add up to 7 documents. Each has one box — paste a screenshot, upload an image, or type the text (or both).</p>`;
  for(let i=1;i<=7;i++){
    html+=`<div class="doc-block">
      <div class="doc-header"><div class="doc-num">${i}</div><div class="doc-title">Document ${i}</div></div>
      <div class="field-group" style="margin-bottom:10px">
        <label>Document Content <span class="hint">— image or text or both</span></label>
        ${uib('doc'+i,'Paste or type the document text here (source, content, attribution)…',3)}
      </div>
    </div>`;
  }
  return html;
}

// ════ BUILD SAQ ════
function buildSAQ(){
  return `<div class="tog-row" id="saqTog">
    <button class="tog-btn active" onclick="setSaqSub('stimulus')">🖼️ Stimulus-Based</button>
    <button class="tog-btn" onclick="setSaqSub('nonstimulus')">📝 Non-Stimulus</button>
  </div>
  <div id="saqStim">
    <div class="field-group">
      <label>Stimulus <span class="hint">— paste/upload the stimulus image or type the source text</span></label>
      ${uib('saqstim','Paste or type the stimulus / primary source here…',4)}
    </div>
    <div class="sdiv">Questions</div>
  </div>
  <div class="q-block"><div class="q-title">Part A</div>
    <label style="margin-bottom:5px">Question <span class="hint">— image or text</span></label>
    ${uib('saqq1','Type Part A question here…',2)}
  </div>
  <div class="q-block"><div class="q-title">Part B</div>
    <label style="margin-bottom:5px">Question <span class="hint">— image or text</span></label>
    ${uib('saqq2','Type Part B question here…',2)}
  </div>
  <div class="q-block"><div class="q-title">Part C <span style="font-weight:500;font-size:.78rem;color:var(--muted);text-transform:none">(optional)</span></div>
    <label style="margin-bottom:5px">Question <span class="hint">— image or text</span></label>
    ${uib('saqq3','Type Part C question here (if applicable)…',2)}
  </div>`;
}

function setSaqSub(sub){
  const btns=document.querySelectorAll('#saqTog .tog-btn');
  btns.forEach((b,i)=>b.classList.toggle('active',(i===0&&sub==='stimulus')||(i===1&&sub==='nonstimulus')));
  const s=document.getElementById('saqStim');
  if(s) s.classList.toggle('hidden',sub==='nonstimulus');
}

// ════ BUILD FRQ (APAAS) ════
function buildFRQ(){
  return `<div class="field-group">
    <label>FRQ Prompt <span class="hint">— paste/upload an image of the prompt or type it</span></label>
    ${uib('frqprompt','Type the FRQ prompt here…',3)}
  </div>`;
}

// ════ BUILD API MESSAGES ════
function buildMessages(resp){
  const parts=[];
  const course=COURSE_NAMES[currentCourse]||currentCourse;

  // Helper: add image + text from a uib key
  function addUib(key){
    const img=IMG[key];
    const txt=document.getElementById('uibtxt-'+key)?.value?.trim();
    if(img) parts.push({type:'image',source:{type:'base64',media_type:'image/png',data:img.split(',')[1]}});
    return txt||'';
  }

  let systemTxt='';

  if(currentType==='leq'){
    const promptTxt=addUib('leqprompt');
    systemTxt=`You are an expert ${course} teacher and College Board-trained grader.\n\nESSAY TYPE: Long Essay Question (LEQ) — ${course}\n\n`;
    if(promptTxt) systemTxt+=`PROMPT:\n${promptTxt}\n\n`;
    if(IMG['leqprompt']) systemTxt+=`[Prompt image provided above]\n\n`;
    systemTxt+=leqRubric(currentCourse);
  }
  else if(currentType==='dbq'){
    const promptTxt=addUib('dbqprompt');
    systemTxt=`You are an expert ${course} teacher and College Board-trained grader.\n\nESSAY TYPE: Document-Based Question (DBQ) — ${course}\n\n`;
    if(promptTxt) systemTxt+=`PROMPT:\n${promptTxt}\n\n`;
    if(IMG['dbqprompt']) systemTxt+=`[Prompt image provided above]\n\n`;
    systemTxt+=`DOCUMENTS:\n`;
    for(let i=1;i<=7;i++){
      const txt=addUib('doc'+i);
      if(txt||IMG['doc'+i]){
        systemTxt+=`\n--- Document ${i} ---\n`;
        if(txt) systemTxt+=`${txt}\n`;
        if(IMG['doc'+i]) systemTxt+=`[Document ${i} image provided]\n`;
      }
    }
    systemTxt+=`\n\n`+dbqRubric(currentCourse);
  }
  else if(currentType==='saq'){
    const isSt=document.querySelector('#saqTog .tog-btn.active')?.textContent?.includes('Stimulus');
    const stimTxt=isSt?addUib('saqstim'):'';
    const q1txt=addUib('saqq1');
    const q2txt=addUib('saqq2');
    const q3txt=addUib('saqq3');
    systemTxt=`You are an expert ${course} teacher and College Board-trained grader.\n\nESSAY TYPE: Short Answer Question (SAQ) — ${isSt?'Stimulus-Based':'Non-Stimulus'} — ${course}\n\n`;
    if(isSt&&stimTxt) systemTxt+=`STIMULUS:\n${stimTxt}\n\n`;
    if(isSt&&IMG['saqstim']) systemTxt+=`[Stimulus image provided]\n\n`;
    systemTxt+=`QUESTIONS:\nA) ${q1txt||'(image provided)'}${IMG['saqq1']?' [image]':''}\nB) ${q2txt||'(image provided)'}${IMG['saqq2']?' [image]':''}\n`;
    if(q3txt||IMG['saqq3']) systemTxt+=`C) ${q3txt||'(image provided)'}${IMG['saqq3']?' [image]':''}\n`;
    systemTxt+=`\n`+saqRubric(currentCourse);
  }
  else if(currentType==='frq'){
    const promptTxt=addUib('frqprompt');
    systemTxt=`You are an expert ${course} teacher and College Board-trained grader.\n\nESSAY TYPE: Free Response Question (FRQ) — ${course}\n\n`;
    if(promptTxt) systemTxt+=`PROMPT:\n${promptTxt}\n\n`;
    systemTxt+=`Grade using the official AP African American Studies FRQ rubric. Award points for: thesis/claim (0-1), evidence and analysis (0-2), contextualization (0-1), complexity/synthesis (0-1). Total 5 points.\n\n`;
  }

  systemTxt+=`\nSTUDENT RESPONSE:\n${resp}\n\n${gradingFormat()}`;
  parts.push({type:'text',text:systemTxt});
  return parts;
}

// ════ RUBRICS ════
function leqRubric(c){
  return `GRADE USING THE OFFICIAL ${c.toUpperCase()} LEQ RUBRIC (7 points total):
- Thesis/Claim (0-1 pt): historically defensible thesis establishing a clear line of reasoning
- Contextualization (0-1 pt): broader historical context meaningfully connected to the argument
- Evidence – Specific Examples (0-1 pt): at least two specific, relevant pieces of historical evidence
- Evidence – Use of Evidence (0-1 pt): evidence is used to support an argument (not just described)
- Analysis & Reasoning – Skill (0-1 pt): uses comparison, causation, or continuity and change over time
- Analysis & Reasoning – Complexity (0-1 pt): demonstrates complex understanding of the topic
(Evidence = 2 pts, Analysis & Reasoning = 2 pts → 7 total)\n\n`;
}
function dbqRubric(c){
  return `GRADE USING THE OFFICIAL ${c.toUpperCase()} DBQ RUBRIC (7 points total):
- Thesis/Claim (0-1 pt): defensible thesis with a line of reasoning
- Contextualization (0-1 pt): broader historical context meaningfully connected
- Evidence – Document Content Basic (0-1 pt): uses content of at least 3 documents
- Evidence – Document Content Advanced (0-1 pt): uses content of at least 6 documents
- Evidence – Sourcing HAPP (0-1 pt): sourcing (Historical situation, Audience, Purpose, or POV) for 3+ docs
- Evidence Beyond Documents (0-1 pt): specific outside evidence not found in the documents
- Complexity / Analysis & Reasoning (0-1 pt): demonstrates complex understanding\n\n`;
}
function saqRubric(c){
  return `GRADE USING THE OFFICIAL ${c.toUpperCase()} SAQ RUBRIC (3 points total):
- Part A (0-1 pt): historically accurate claim or analysis directly answering Part A
- Part B (0-1 pt): historically accurate claim or analysis directly answering Part B
- Part C (0-1 pt): historically accurate claim or analysis directly answering Part C (if applicable)\n\n`;
}
function gradingFormat(){
  return `Grade strictly per the rubric. Reply in EXACTLY this format:

SCORE: [X]/[TOTAL]

RUBRIC BREAKDOWN:
[One line per rubric point: ✅ EARNED — one-sentence reason  OR  ❌ NOT EARNED — one-sentence reason]

STRENGTHS:
• [strength 1]
• [strength 2]
• [strength 3 if applicable]

AREAS TO IMPROVE:
• [specific actionable suggestion 1]
• [specific actionable suggestion 2]
• [specific actionable suggestion 3 if applicable]

OVERALL FEEDBACK:
[2–3 warm, encouraging sentences summarizing performance and key next steps]

Be fair, specific, and student-friendly.`;
}

// ════ SUBMIT ════
async function submitGrade(){
  const resp=document.getElementById('userResponse').value.trim();
  if(!resp){ toast('⚠️ Please write your response first!'); return; }
  ['step1','step2','step3','step4'].forEach(id=>hide(id));
  show('loading'); hide('results');
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1500,messages:[{role:'user',content:buildMessages(resp)}]})
    });
    const data=await res.json();
    const text=(data.content||[]).map(b=>b.text||'').join('');
    renderResults(text);
  }catch(err){
    renderResults('⚠️ Could not connect. Please try again.\n\nError: '+err.message);
  }
}

// ════ RENDER RESULTS ════
function renderResults(raw){
  hide('loading'); show('results');
  const m=raw.match(/SCORE:\s*(\d+)\s*\/\s*(\d+)/i);
  const badge=document.getElementById('scoreBadge');
  if(m){
    const e=+m[1],t=+m[2],p=e/t;
    badge.textContent=`${e} / ${t} pts`;
    badge.className='score-badge '+(p>=.71?'s-hi':p>=.43?'s-md':'s-lo');
  }else{badge.textContent='Graded';badge.className='score-badge s-md';}

  const secs={};
  const re=/(SCORE|RUBRIC BREAKDOWN|STRENGTHS|AREAS TO IMPROVE|OVERALL FEEDBACK):([\s\S]*?)(?=(?:SCORE|RUBRIC BREAKDOWN|STRENGTHS|AREAS TO IMPROVE|OVERALL FEEDBACK):|$)/gi;
  let sm;
  while((sm=re.exec(raw))!==null) secs[sm[1].trim().toUpperCase()]=sm[2].trim();

  let html='';
  if(secs['RUBRIC BREAKDOWN']){
    html+=`<div class="res-sec"><div class="res-sec-t">📊 Rubric Breakdown</div>`;
    secs['RUBRIC BREAKDOWN'].split('\n').forEach(line=>{
      line=line.trim(); if(!line) return;
      const e=line.startsWith('✅'),m2=line.startsWith('❌');
      if(e||m2) html+=`<div class="rrow ${e?'e':'m'}"><span class="ri">${e?'✅':'❌'}</span><span class="rt">${esc(line.replace(/^[✅❌]\s*/,''))}</span></div>`;
    });
    html+=`</div>`;
  }
  if(secs['STRENGTHS']){
    html+=`<div class="res-sec"><div class="res-sec-t">🌟 Strengths</div>`;
    secs['STRENGTHS'].split('\n').forEach(l=>{l=l.trim();if(l) html+=`<div class="fitem"><span class="fi">⭐</span><span>${esc(l.replace(/^[•\-*]\s*/,''))}</span></div>`;});
    html+=`</div>`;
  }
  if(secs['AREAS TO IMPROVE']){
    html+=`<div class="res-sec"><div class="res-sec-t">🔧 Areas to Improve</div>`;
    secs['AREAS TO IMPROVE'].split('\n').forEach(l=>{l=l.trim();if(l) html+=`<div class="fitem"><span class="fi">💡</span><span>${esc(l.replace(/^[•\-*]\s*/,''))}</span></div>`;});
    html+=`</div>`;
  }
  if(secs['OVERALL FEEDBACK']){
    html+=`<div class="res-sec"><div class="res-sec-t">📝 Overall Feedback</div><div class="overall">${esc(secs['OVERALL FEEDBACK'])}</div></div>`;
  }
  if(!html) html=`<div class="overall" style="white-space:pre-wrap">${esc(raw)}</div>`;
  html+=`<button class="retry-btn" onclick="resetAll()">↩ Grade Another Response</button>`;
  document.getElementById('resBody').innerHTML=html;
  document.getElementById('results').scrollIntoView({behavior:'smooth',block:'start'});
}

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// ════ RESET ════
function resetAll(){
  currentCourse=null; currentType=null;
  Object.keys(IMG).forEach(k=>delete IMG[k]);
  document.querySelectorAll('.course-btn,.type-btn').forEach(b=>b.classList.remove('active'));
  ['step2','step3','step4'].forEach(id=>hide(id));
  show('step1');
  hide('results'); hide('loading');
  document.getElementById('userResponse').value='';
  window.scrollTo({top:0,behavior:'smooth'});
}

// ════ HELPERS ════
function show(id){ document.getElementById(id).classList.remove('hidden'); document.getElementById(id).style.display=''; }
function hide(id){ document.getElementById(id).classList.add('hidden'); }
function anim(id){ const el=document.getElementById(id); el.style.animation='none'; requestAnimationFrame(()=>el.style.animation=''); }
</script>
